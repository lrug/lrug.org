march:
  if-agentic-coding-is-the-tool-shift-whats-the-role-shift:
    title: "If agentic coding is the tool shift, what's the role shift?"
    speaker:
      name: Andy Walker
      url: https://www.linkedin.com/in/andrew-w-7332b7117/
    description: |-
      In this talk I'll compare today's AI moment to past tech S-curves, and argue it's not only a
      toolset change that's required (learning to code agentically) but a deeper change in how we
      work.

      I'll cover the mindset and capability shifts this demands: outcome ownership, faster feedback
      loops, more autonomy. I'll cover what engineers can do to meet the moment.

      I'll also share how this is changing the way I think about hiring and scaling teams: what
      signals matter now, and how we're adapting interview loops to find people who thrive in an
      agentic world

  rag-on-rails:
    title: "RAG on Rails"
    speaker:
      name: Neil Cameron
      url: https://neilcameron.me
    description: |-
      A brief guide to building out a retrieval augmented generation system on Rails.

      We'll cover some of the basic (chunking, embeddings) and some not so basic things (why bother
      re-ranking). You'll come away with an understanding of the different moving parts of a RAG
      system and some tactical recommendations of gems and services to use.

april:
  the-hottest-new-programming-language-is-ubiquitous-within-a-bounded-context-window:
    title: "The Hottest New Programming Language Is Ubiquitous (Within A Bounded Context Window)"
    speaker:
      name: "Hemal Varambhia"
      url: https://github.com/hemalvarambhia
    description: |-
      The title is a play on Andrey Karpathy's tweet.

      This talk is a continuation of the one I gave at LRUG in March 2025.

      Later that year I really started to reap the benefits of DDD and Ports and Adapters: refining
      the programmer tests (no more Docker for unit tests!) and bringing the ubiquitous language to
      life, which made writing tests cheap, and more importantly, fun.

      Towards the end of 2025, I gave in to FOMO and started exploring AI-assisted programming. I
      was particularly interested to see if it was now possible to prompt the LLM entirely in the
      ubiquitous language and produce well-structured code.

      Is the future of programming DDD's ubiquitous language?
may:
  ruby-in-parallel-fibers-ractors-and-ruby-4:
    title: "Ruby in Parallel: Fibers, Ractors, and Ruby 4"
    speaker:
      name: Sam Burns
      url: https://sam-burns.com/tags/talks/
    description: |
      Ruby 4 builds on Ruby 3's concurrency features, introducing refinements to Fibers and Ractors.
      This milestone in the language's evolution transforms concurrency from an experimental
      frontier to a production-ready reality.

      This talk provides an up-to-date guide to Ruby’s modern concurrency toolkit, from the
      lightweight efficiency of Fibers to the parallel power of Ractors.

      Join us to explore the core concurrency features of Ruby, and get an up-to-date picture of
      the latest developments in Ruby 4.
  p-rs-without-code-review-building-a-risk-classification-pipeline-in-ruby:
    title: "PRs without code review: Building a risk classification pipeline in Ruby"
    speaker:
      name: "Adrian Booth"
      url: https://www.linkedin.com/in/adrianfbooth/
    description: |
       Agents are shifting the bottleneck from implementation to verification.

       In this talk I'll discuss how to build a risk classification pipeline in Ruby which we've
       beenusing since January of this year to classify our code changes, which opened the door for
       us to safely enable auto-approvals on Github PRs

       The talk will spend roughly 10-15 minutes on implementation and another 10 minutes
       explaining how to convince teams / engineers to adopt in your org.
